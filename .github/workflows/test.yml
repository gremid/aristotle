name: Tests

on:
  - push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: 25
      - uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654
      - name: Run tests
        run: clojure -M:test
        shell: bash
